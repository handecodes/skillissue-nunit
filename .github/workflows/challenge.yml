name: challenge
on:
  push:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Run the single catching test
        run: >
          dotnet test src/NUnitFramework/tests/nunit.framework.tests.csproj
          -c Release
          -f net8.0
          -p:NUnitRuntimeFrameworks=net8.0
          --filter "FullyQualifiedName~CollectionSupersetConstraintTests.SucceedsWithGoodValues"
